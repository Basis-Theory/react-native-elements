name: Release

on:
  release:
    types: [released]

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write # Required for OIDC trusted publishing to npm
      contents: write
      actions: read
    environment: PROD # Must match npm trusted publisher config exactly (case-sensitive)
    strategy:
      matrix:
        node: ["20.x"]
        os: [ubuntu-latest]
    env:
      CI: 1
    steps:
      - name: Mint semantic-release app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.SEMANTIC_RELEASE_APP_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Start Deploy Message
        uses: Basis-Theory/public-github-actions/deploy-slack-action@12362db6b1ad6b524d28c47a6489c3e73ecd656a # master
        with:
          slack-api-token: ${{ secrets.SLACK_DUCKBOT_API_KEY }}
          channel: ${{ vars.SLACK_DUCKBOT_RELEASE_CHANNEL_ID }}

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          # registry-url is intentionally NOT set - it creates .npmrc that blocks OIDC

      - name: Update npm for Trusted Publishing
        run: npm install -g npm@11.18.0 # Pinned: npm 11.5.1+ needed for OIDC, Node 20 compatible (npm 12+ requires Node 22+)

      - name: Install deps
        run: yarn --immutable --no-progress --ignore-scripts

      - name: Bump Version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          make update-version NEW_VERSION="${TAG_NAME#v}"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Update CHANGELOG (conventional-changelog)
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VER="${TAG_NAME#v}"
          if grep -qF "[$VER](" CHANGELOG.md; then
            echo "CHANGELOG already lists ${VER}; skipping."
            exit 0
          fi
          # The release tag already exists (it triggered this run); drop it
          # locally so conventional-changelog emits this version instead of an
          # empty section. The remote tag is untouched.
          git tag -d "$TAG_NAME" 2>/dev/null || true
          yarn changelog:release
          if ! grep -qF "[$VER](" CHANGELOG.md; then
            echo "::warning::conventional-changelog produced no ${VER} entry (no conventional commits since the previous tag)."
          fi

      - name: Build
        run: make build
        env:
          SKIP_INSTALL: 1 # install with cache was done already

      - name: Publish Package to NPM
        run: ./scripts/publish-to-npm.sh

      - name: Commit Version to Repo
        run: |
          set -euo pipefail
          git config --local user.email "platform@basistheory.com"
          git config --local user.name "github-actions[bot]"
          VERSION=$(jq -r '.version' package.json)
          git add package.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(release): ${VERSION} [skip ci]"
          git push origin HEAD:master

      - name: Stop Deploy Message
        if: always()
        uses: Basis-Theory/public-github-actions/deploy-slack-action@12362db6b1ad6b524d28c47a6489c3e73ecd656a # master
        with:
          slack-api-token: ${{ secrets.SLACK_DUCKBOT_API_KEY }}
          channel: ${{ vars.SLACK_DUCKBOT_RELEASE_CHANNEL_ID }}
          status: "done"
