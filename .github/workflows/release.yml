name: Release

on:
  release:
    types: [released]

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write # Required for OIDC trusted publishing to npm
      contents: write
      actions: read
    environment: PROD # Must match npm trusted publisher config exactly (case-sensitive)
    strategy:
      matrix:
        node: ["20.x"]
        os: [ubuntu-latest]
    env:
      CI: 1
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SEMANTIC_RELEASE_PAT }}
          fetch-depth: 0

      - name: Start Deploy Message
        uses: Basis-Theory/public-github-actions/deploy-slack-action@master
        with:
          slack-api-token: ${{ secrets.SLACK_DUCKBOT_API_KEY }}
          channel: ${{ vars.SLACK_DUCKBOT_RELEASE_CHANNEL_ID }}

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          # registry-url is intentionally NOT set - it creates .npmrc that blocks OIDC

      - name: Update npm for Trusted Publishing
        run: npm install -g npm@latest # Requires npm 11.5.1+ for OIDC support

      - name: Install deps
        run: yarn --immutable --no-progress --ignore-scripts

      - name: Bump Version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          make update-version NEW_VERSION="${TAG_NAME#v}"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Update CHANGELOG (conventional-changelog)
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VER="${TAG_NAME#v}"
          if grep -qF "[$VER](" CHANGELOG.md; then
            echo "CHANGELOG already lists ${VER}; skipping."
            exit 0
          fi
          yarn changelog:release

      - name: Build
        run: make build
        env:
          SKIP_INSTALL: 1 # install with cache was done already

      - name: Publish Package to NPM
        run: cd dist && npm publish --access public

      - name: Commit Version to Repo
        run: |
          set -euo pipefail
          git config --local user.email "platform@basistheory.com"
          git config --local user.name "github-actions[bot]"
          VERSION=$(jq -r '.version' package.json)
          git add package.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(release): ${VERSION} [skip ci]"
          git push origin HEAD:master

      - name: Stop Deploy Message
        if: always()
        uses: Basis-Theory/public-github-actions/deploy-slack-action@master
        with:
          slack-api-token: ${{ secrets.SLACK_DUCKBOT_API_KEY }}
          channel: ${{ vars.SLACK_DUCKBOT_RELEASE_CHANNEL_ID }}
          status: "done"
